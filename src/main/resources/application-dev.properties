spring.application.name=raizes-do-nordeste
# banco postgres

spring.datasource.url=jdbc:postgresql://localhost:5432/raizes_do_nordeste?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=admin
spring.datasource.password=1234
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none


spring.flyway.url=jdbc:postgresql://localhost:5432/raizes_do_nordeste
spring.flyway.user=admin
spring.flyway.password=1234
spring.flyway.baseline-on-migrate=true
